# Nginx snippet pro routování /padel → padel-app na VPS, kde už běží beer-app nginx.
# Přidej TENTO BLOK do existujícího `server { ... }` v beer-app nginx configu
# a pošli `nginx -s reload`. NERESETUJEME celé nginx – stačí reload.
#
# Bezpečnostní poznámka: padel-app bindneme pouze na 127.0.0.1:3101 (viz
# docker-compose.prod.yml), takže kontejner není dostupný zvenku přímo.

location /padel/ {
    proxy_pass         http://127.0.0.1:3101/padel/;
    proxy_http_version 1.1;

    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";

    # Server Actions a dlouhé requesty
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    # Auth.js cookies mohou být delší; default buffer bývá malý.
    proxy_buffer_size           16k;
    proxy_buffers               4 32k;
    proxy_busy_buffers_size     64k;
}

# Nezapomeň: Next.js standalone obsluhuje statiku z basePath sám (/padel/_next/static/…),
# takže NENÍ třeba další `location /padel/_next/` blok.
