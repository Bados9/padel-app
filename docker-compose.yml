services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      target: dev
    container_name: padel-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3000"
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_BASE_PATH: ""
      DATABASE_URL: postgresql://padel:padel@postgres:5432/padel?schema=public
      AUTH_SECRET: dev-secret-change-me
      AUTH_TRUST_HOST: "true"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - padel

  postgres:
    image: postgres:16-alpine
    container_name: padel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: padel
      POSTGRES_USER: padel
      POSTGRES_PASSWORD: padel
    volumes:
      - padel_postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U padel -d padel"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - padel

volumes:
  padel_postgres_data:

networks:
  padel:
    name: padel_network
